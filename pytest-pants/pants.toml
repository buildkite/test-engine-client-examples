[GLOBAL]
pants_version = "2.31.0"
backend_packages = [
  "pants.backend.python",
  # Let Pants fetch its own hermetic CPython interpreter (Python Build
  # Standalone) so the example does not depend on the interpreter that happens
  # to be installed on the machine or in the CI image.
  "pants.backend.python.providers.experimental.python_build_standalone",
]

[python]
interpreter_constraints = ["CPython==3.13.*"]
enable_resolves = true
resolves_generate_lockfiles = true
# Everything (first-party code, tests, and the pytest tool) uses the one resolve
# so the buildkite-test-collector pytest plugin is available when running tests.
default_resolve = "pytest"

[python.resolves]
pytest = "3rdparty/python/pytest.lock"

[pytest]
# Install pytest (and its plugins, e.g. buildkite-test-collector) from the
# resolve above rather than from Pants' built-in default lockfile.
install_from_resolve = "pytest"
requirements = ["//3rdparty/python:pytest"]

[test]
# Expose the Buildkite environment to the pytest sandbox so the
# buildkite-test-collector plugin can attach CI metadata and upload results to
# Test Engine. Unset variables (e.g. when running locally) are simply ignored,
# and without BUILDKITE_ANALYTICS_TOKEN the collector just writes results
# locally instead of uploading.
extra_env_vars = [
  "CI",
  "BUILDKITE_ANALYTICS_TOKEN",
  "BUILDKITE_BUILD_ID",
  "BUILDKITE_BUILD_NUMBER",
  "BUILDKITE_BUILD_URL",
  "BUILDKITE_JOB_ID",
  "BUILDKITE_BRANCH",
  "BUILDKITE_COMMIT",
  "BUILDKITE_MESSAGE",
  "BUILDKITE_ORGANIZATION_SLUG",
  "BUILDKITE_PIPELINE_SLUG",
]

[source]
root_patterns = ["src"]
