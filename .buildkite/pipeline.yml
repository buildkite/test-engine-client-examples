steps:
  - label: ":ruby: :rspec: Ruby: RSpec"
    parallelism: 2
    command: "cd rspec && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: rspec
          result-path: tmp/rspec.json
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "ruby:3.4-bookworm" # requires curl
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":ruby: Ruby: Minitest"
    parallelism: 2
    command: "cd ruby-minitest && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: custom
          test-cmd: "bundle exec rake test TEST_FILES='{{testExamples}}'"
          test-file-pattern: "**/*_test.rb"
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "ruby:3.4-bookworm" # requires curl
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":jest: Jest"
    parallelism: 2
    command: "cd jest && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: jest
          result-path: jest-result.json
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "node:23.1.0-bookworm"
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":cypress: Cypress"
    parallelism: 2
    command: "cd cypress && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: cypress
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "cypress/included:13.15.1"
          entrypoint: ""
          shell: ["/bin/sh", "-e", "-c"]
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":playwright: Playwright"
    parallelism: 2
    command: "cd playwright && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: playwright
          result-path: tmp/playwright-results.json
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "mcr.microsoft.com/playwright:v1.48.1-noble"
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":pytest: pytest"
    parallelism: 2
    artifact_paths:
      - pytest/result.json
    command: "cd pytest && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: pytest
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "python:3.13.2-bookworm"
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":pytest: pytest with (xdist)"
    parallelism: 2
    artifact_paths:
      - pytest/result.json
    command: "cd pytest-xdist && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: pytest
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          client-os: linux
          upload-results: false
      - docker#v5.13.0:
          image: "python:3.13.2-bookworm"
          expand-volume-vars: true
          volumes:
            - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
          propagate-environment: true

  - label: ":pytest: :pants: pytest (Pants)"
    # Pants owns test discovery and execution; the buildkite-test-collector
    # pytest plugin uploads results to Test Engine. Authentication uses an
    # ephemeral OIDC token minted in bin/test (no static suite token), which
    # needs the agent binary inside the container (mount-buildkite-agent).
    command: "cd pytest-pants && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - docker#v5.13.0:
          image: "python:3.13.2-bookworm"
          # Pass pipeline env variables (incl. BUILDKITE_* run metadata) to the container
          propagate-environment: true
          # Make buildkite-agent available in the container for OIDC token requests
          # See https://buildkite.com/docs/test-engine/test-collection/oidc
          mount-buildkite-agent: true

  - label: ":swift: Swift: XCTest (test-collector-swift)"
    command: "cd swift-xctest && bin/test"
    soft_fail:
      - exit_status: 1
    env:
      BUILDKITE_ANALYTICS_TAGS: '{"test.framework.name":"xctest","language.name":"swift","custom.tag.from":"upload"}'
    plugins:
      - cluster-secrets#v1.0.0:
          variables:
            BUILDKITE_ANALYTICS_TOKEN: test_engine_client_examples_suite_token
      - docker#v5.11.0:
          image: "swift:6.0-noble"
          propagate-environment: true
          environment:
            - BUILDKITE_ANALYTICS_TOKEN
            - BUILDKITE_ANALYTICS_TAGS
            - BUILDKITE_ANALYTICS_DEBUG_ENABLED

  - label: ":android: Android"
    command: "cd android && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - cluster-secrets#v1.0.0:
          variables:
            BUILDKITE_ANALYTICS_TOKEN: test_engine_client_examples_suite_token
      - docker#v5.11.0:
          image: "ghcr.io/cirruslabs/android-sdk:34"
          propagate-environment: true
          environment:
            - BUILDKITE_ANALYTICS_TOKEN

  - label: ":dotnet: NUnit"
    parallelism: 2
    command: "cd nunit && bin/test"
    soft_fail:
      - exit_status: 1
    plugins:
      - tests#v1.0.0:
          test-runner: nunit
          result-path: test-results/results.xml
          test-file-pattern: "tests/**/*Tests.cs"
          suite-slug: test-engine-client-examples
          client-version: "2.8.1"
          tags:
            - "language.name=dotnet"
            - "test.framework.name=nunit"
      - mise#v1.1.1:
          dir: nunit

  - group: "Additional bktec features"
    key: "jest-retry"
    steps:
      - label: ":jest: Jest (Retry Enabled)"
        parallelism: 2
        command: "cd jest && bin/test-with-retry"
        soft_fail:
          - exit_status: 1
        plugins:
          - tests#v1.0.0:
              test-runner: jest
              result-path: jest-result.json
              retry-count: 3
              retry-cmd: "npx jest {{testExamples}} --testNamePattern '{{testNamePattern}}' --json --testLocationInResults --outputFile {{resultPath}}"
              suite-slug: test-engine-client-examples
              client-version: "2.8.1"
              client-os: linux
              upload-results: false
          - docker#v5.13.0:
              image: "node:23.1.0-bookworm"
              expand-volume-vars: true
              volumes:
                - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
              propagate-environment: true

      - label: ":pytest: pytest (tag filters)"
        parallelism: 2
        artifact_paths:
          - pytest/result.json
        command: "cd pytest-tag-filters && bin/test"
        soft_fail:
          - exit_status: 1
        plugins:
          - tests#v1.0.0:
              test-runner: pytest
              tag-filters: "component:frontend"
              suite-slug: test-engine-client-examples
              client-version: "2.8.1"
              client-os: linux
              upload-results: false
          - docker#v5.13.0:
              image: "python:3.13.2-bookworm"
              expand-volume-vars: true
              volumes:
                - "$$BUILDKITE_TEST_ENGINE_CLIENT_PATH:/usr/local/bin/bktec"
              propagate-environment: true
